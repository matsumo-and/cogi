# Cogi Configuration File
# デフォルトの保存場所: ~/.cogi/config.yaml
#
# このファイルをコピーして使用してください:
#   cp sample/config.yaml ~/.cogi/config.yaml

# データベース設定（SQLite）
database:
  # データベースファイルのパス
  # デフォルト: ~/.cogi/data.db
  path: "~/.cogi/data.db"

  # WALモードを有効化（推奨）
  # WALモードは並列読み取りを改善します
  wal_mode: true

  # キャッシュサイズ（MB）
  # 大きいほど高速ですが、メモリを多く使用します
  cache_size_mb: 256

# 埋め込みモデル設定（セマンティック検索用）
embedding:
  # プロバイダー（現在はollamaのみサポート）
  provider: "ollama"

  # 使用する埋め込みモデル
  model: "mxbai-embed-large"

  # Ollamaエンドポイント
  endpoint: "http://localhost:11434"

  # ベクトルの次元数
  # モデルに応じて設定してください
  # nomic-embed-text: 768
  # mxbai-embed-large: 1024
  dimension: 1024

  # バッチサイズ
  # 埋め込み生成時の一度に処理する数
  # 大きいほど高速ですが、メモリを多く使用します
  batch_size: 32

# インデックス設定
indexing:
  # 最大ファイルサイズ（MB）
  # これより大きいファイルはスキップされます
  max_file_size_mb: 10

  # 除外パターン
  # これらのパターンに一致するファイル/ディレクトリはインデックスされません
  exclude_patterns:
    - "*/node_modules/*"    # Node.js依存関係
    - "*/vendor/*"          # Go/PHP依存関係
    - "*/.git/*"            # Gitディレクトリ
    - "*/dist/*"            # ビルド出力
    - "*/build/*"           # ビルド出力
    - "*/.next/*"           # Next.js出力
    - "*/.venv/*"           # Python仮想環境
    - "*/venv/*"            # Python仮想環境
    - "*/__pycache__/*"     # Pythonキャッシュ
    - "*.pyc"               # Pythonコンパイル済みファイル
    - "*.min.js"            # 最小化されたJavaScript
    - "*.min.css"           # 最小化されたCSS

# パフォーマンス設定
performance:
  # 並列ワーカー数
  # インデックス構築時の並列処理数
  # CPUコア数に応じて調整してください
  max_workers: 8
