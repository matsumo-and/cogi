name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      env:
        CGO_ENABLED: 1
      run: go test -v -race -tags fts5 ./internal/...

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc

    - name: Download dependencies
      run: go mod download

    - name: Build
      env:
        CGO_ENABLED: 1
      run: go build -tags fts5 -v -o cogi ./cmd/cogi

    - name: Verify binary
      run: ./cogi --help

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: cogi-linux-amd64
        path: cogi
        retention-days: 7